<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TpNode-Intro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Panel de Personajes Épicos</h1>
        <button id="theme-toggle" title="Cambiar tema"><img src="./assets/luna.png" alt="Icono de luna"></button>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Crear Nuevo Personaje</h2>
            <form id="character-form">
                <div class="form-group">
                    <label for="name">Nombre:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="race">Raza:</label>
                    <input type="text" id="race" required>
                </div>
                <div class="form-group">
                    <label for="role">Rol:</label>
                    <input type="text" id="role" required>
                </div>
                <div class="form-group">
                    <label for="level">Nivel:</label>
                    <input type="number" id="level" required>
                </div>
                <div class="form-group">
                    <label for="universe">Universo:</label>
                    <input type="text" id="universe" required>
                </div>
                <button type="submit">Guardar Personaje</button>
            </form>
            <div id="form-message" class="message"></div>
        </section>

        <section class="list-section">
            <h2>Lista de Personajes</h2>
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <input type="text" id="search-input" placeholder="🔍 Buscar por nombre (ej. Arthas)...">
            </div>
            <div id="characters-container" class="cards-grid"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
